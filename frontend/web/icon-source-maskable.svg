<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable variant: full-bleed gradient square (no transparent corners) so
       Android/PWA masks (circle/squircle) crop cleanly. The glyph sits within
       the inner safe zone. -->
