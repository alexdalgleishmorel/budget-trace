name: Deploy demo to GitHub Pages

# Builds the Flutter web app in DEMO_MODE (in-memory mock backend) and publishes
# it to GitHub Pages. Manual trigger only.
#
# This file lives on the default branch (main) so it shows up in the Actions UI
# and can be dispatched — but it always builds the `demo` branch's code (see the
# explicit `ref: demo` checkout), which carries the demo implementation.
#
# One-time setup: Settings → Pages → Build and deployment → Source = GitHub Actions.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout the demo branch
        uses: actions/checkout@v4
        with:
          ref: demo

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.0

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      - name: Build web (demo)
        run: flutter build web --release --dart-define=DEMO_MODE=true --base-href=/budget-trace/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

      - id: deploy
        uses: actions/deploy-pages@v4
