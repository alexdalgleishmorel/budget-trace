<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Expense Visualizer — see where your money goes.">

  <!-- Match the app's darkest background (bgGrad[0]) so browser chrome and
       mobile safe areas don't flash white around the Flutter canvas. -->
  <meta name="theme-color" content="#060D18">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background-color: #060D18; }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Expense Visualizer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon — crisp SVG with a PNG fallback for older browsers. -->
  <link rel="icon" type="image/svg+xml" href="icon-source.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Expense Visualizer</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
